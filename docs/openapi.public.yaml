openapi: 3.1.0
info:
  title: API de Implantacao de IA
  description: Uma API para gerenciar a implantação de modelos de IA
  version: 1.0.0
paths:
  /ia/integracao:
    post:
      summary: Integrar Ia
      description: >-
        Gera uma resposta de IA com base no contexto e na pergunta informados.


        Este endpoint envia a solicitação ao provedor configurado e retorna o
        texto gerado.
      operationId: integrar_ia_ia_integracao_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegracaoEntrada'
        required: true
      responses:
        '200':
          description: Resposta gerada pela IA
          content:
            application/json:
              schema: {}
              example:
                detail: Resposta gerada pela IA
        '422':
          description: Erro de validação da requisição
          content:
            application/json:
              example:
                detail: 'Erro de validação: campo ''pergunta'' é obrigatório.'
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              example:
                detail: Cliente da API não configurado corretamente.
        '502':
          description: Falha na comunicação com o OpenRouter
          content:
            application/json:
              example:
                detail: Falha na chamada ao OpenRouter.
        '504':
          description: Timeout ao chamar o OpenRouter
          content:
            application/json:
              example:
                detail: Timeout ao chamar o OpenRouter.
  /:
    get:
      summary: Read Root
      description: |-
        Retorna mensagem de boas-vindas da API.

        Útil para validação rápida de disponibilidade do serviço.
      operationId: read_root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /status:
    get:
      summary: Get Status
      description: >-
        Retorna o status operacional da API.


        Endpoint de health-check para monitoramento e integração com
        orquestradores.
      operationId: get_status_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    IntegracaoEntrada:
      properties:
        contexto:
          type: string
          title: Contexto
          description: Contexto do problema ou tarefa para a IA
          default: Contexto padrão
        pergunta:
          type: string
          title: Pergunta
          description: Pergunta principal para a IA responder
          default: Pergunta padrão
        objetivo:
          type: string
          title: Objetivo
          default: Fornecer uma resposta útil e presisa com clareza e objetividade.
        formato_saida:
          type: string
          title: Formato Saida
          default: Texto simples
        limites:
          type: string
          title: Limites
          default: >-
            Evitar respostas vagas ou genéricas e informações falsas ou
            enganosas.
      type: object
      title: IntegracaoEntrada
      description: >-
        Payload de entrada para integração com IA.


        Define os campos necessários para gerar uma resposta contextualizada no
        modelo configurado.
